# =============================================================================
# Secrets Configuration Template - arcgis-enterprise-clone-content
# =============================================================================
# Copy this file to secrets.yml and fill in your actual values.
# NEVER commit secrets.yml to version control!
#
# Ensure secrets.yml is listed in .gitignore.
#
# Each top-level key matches a named portal environment in config.yml.
# Add a new block here (and in secrets.yml) whenever a new portal is added.
# =============================================================================

# Authentication: use either 'profile' (ArcGIS named profile) OR 'url' +
# 'username' + 'password'. If 'profile' is set, the other three are ignored.

source:
  profile: ""                                            # optional: ArcGIS named profile
  url: "https://source-arcgis-enterprise.example.com/arcgis"  # used when profile is empty
  username: "your_source_username"
  password: "your_source_password"

destination:
  profile: ""                                                 # optional: ArcGIS named profile
  url: "https://destination-arcgis-enterprise.example.com/arcgis"
  username: "your_destination_username"
  password: "your_destination_password"
